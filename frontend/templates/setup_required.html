<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Required — BillMate</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center}
.icon{font-size:3em;margin-bottom:16px}
.title{font-size:1.3em;font-weight:700;color:#1a1a2e;margin-bottom:8px}
.sub{font-size:.9em;color:#666;margin-bottom:8px;line-height:1.5}
.fields{font-size:.85em;color:#888;margin-bottom:24px;line-height:1.8}
.fields span{display:inline-block;padding:3px 10px;margin:2px;background:#f1f3f9;border-radius:6px;font-weight:600;color:#4f46e5}
.btn{display:inline-block;padding:13px 32px;border:none;border-radius:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:1em;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(102,126,234,.4)}
.back{display:block;margin-top:16px;font-size:.85em;color:#aaa;text-decoration:none}
.back:hover{color:#667eea}
</style>
</head>
<body>
<div class="card">
  <div class="icon">⚙️</div>
  <div class="title">Complete Your Setup</div>
  <div class="sub">Please fill in your business details to unlock full access to all features.</div>
  <div class="fields">
    Required: <span>Business Name</span> <span>Address</span> <span>Phone</span> <span>WhatsApp</span>
  </div>
  <a href="/admin/setup" class="btn">Go to Setup</a>
  <a href="/billing" class="back">← Back to Billing</a>
</div>
</body>
</html>
