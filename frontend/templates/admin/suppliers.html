{% extends 'admin/base.html' %}
{% block title %}Suppliers{% endblock %}
{% block btn_suppliers %}active{% endblock %}

{% block content_main %}
<div class="section-header">
  <div class="section-title">🏭 Suppliers</div>
  <input class="search-box" id="supSearch" placeholder="Search by name or phone..." oninput="supFilter(this.value)">
  <button onclick="openSupAdd()" style="padding:9px 18px;border:none;border-radius:10px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:.88em;font-weight:600;cursor:pointer">+ Add Supplier</button>
</div>
<div class="card">
  <table>
    <thead>
      <tr>
        <th>Name</th><th>Phone</th><th>Address</th><th>Notes</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="supBody"></tbody>
  </table>
</div>

<!-- Edit / Add Modal -->
<div class="overlay" id="supModal" onclick="if(event.target===this)closeSupModal()">
  <div class="modal">
    <h2 id="supModalTitle" style="color:var(--text);margin-bottom:20px">Add Supplier</h2>
    <input type="hidden" id="sEditId">
    <div style="margin-bottom:14px">
      <label style="font-size:.78em;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px">Full Name *</label>
      <input id="s_name" style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--inp);color:var(--text);font-size:.9em;outline:none" oninput="this.value=toTitleCase(this.value)">
    </div>
    <div style="margin-bottom:14px">
      <label style="font-size:.78em;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px">Phone</label>
      <input id="s_phone" style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--inp);color:var(--text);font-size:.9em;outline:none">
    </div>
    <div style="margin-bottom:14px">
      <label style="font-size:.78em;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px">Address</label>
      <textarea id="s_address" style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--inp);color:var(--text);font-size:.9em;outline:none;resize:vertical;min-height:60px"></textarea>
    </div>
    <div style="margin-bottom:14px">
      <label style="font-size:.78em;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px">Notes</label>
      <textarea id="s_notes" style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--inp);color:var(--text);font-size:.9em;outline:none;resize:vertical;min-height:60px"></textarea>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button onclick="closeSupModal()" style="flex:1;padding:10px;border:none;border-radius:10px;background:var(--border);color:var(--text);font-weight:600;cursor:pointer">Cancel</button>
      <button onclick="saveSupplier()" style="flex:1;padding:10px;border:none;border-radius:10px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-weight:600;cursor:pointer">Save</button>
    </div>
  </div>
</div>

<!-- View Modal -->
<div class="overlay" id="supViewModal" onclick="if(event.target===this)closeSupView()">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 id="sv_name" style="color:var(--text);font-size:1.2em"></h2>
      <button onclick="closeSupView()" style="background:none;border:none;font-size:1.3em;cursor:pointer;color:var(--sub)">✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;gap:8px;font-size:.9em"><span style="color:var(--sub);min-width:110px">Phone</span><span id="sv_phone" style="font-weight:600;color:var(--text)"></span></div>
      <div style="display:flex;gap:8px;font-size:.9em"><span style="color:var(--sub);min-width:110px">Address</span><span id="sv_address" style="font-weight:600;color:var(--text)"></span></div>
      <div style="display:flex;gap:8px;font-size:.9em"><span style="color:var(--sub);min-width:110px">Notes</span><span id="sv_notes" style="font-weight:600;color:var(--text)"></span></div>
    </div>
    <div style="margin-top:20px">
      <button onclick="closeSupView()" class="mbtn mbtn-close" style="width:100%">Close</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
var allSuppliers=[], editMode=false;

async function loadSuppliers(){
  const r=await fetch('/api/suppliers');
  allSuppliers=await r.json();
  renderSuppliers(allSuppliers);
}

function supFilter(q){
  const s=q.toLowerCase();
  renderSuppliers(allSuppliers.filter(c=>c.name.toLowerCase().includes(s)||(c.phone||'').includes(s)));
}

function renderSuppliers(list){
  const body=document.getElementById('supBody');
  if(!list.length){body.innerHTML=`<tr><td colspan="5"><div class="empty"><div class="empty-icon">🏭</div>No suppliers found.</div></td></tr>`;return;}
  body.innerHTML=list.map(s=>`
    <tr>
      <td data-label="Name" style="font-weight:600">${esc(s.name)}</td>
      <td data-label="Phone">${esc(s.phone)||'—'}</td>
      <td data-label="Address" style="font-size:.85em;color:var(--sub)">${esc(s.address)||'—'}</td>
      <td data-label="Notes" style="font-size:.85em;color:var(--sub)">${esc(s.notes)||'—'}</td>
      <td>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <button class="act-btn ab-view" onclick="viewSup(${s.id})">View</button>
          <button class="act-btn ab-edit" onclick="openSupEdit(${s.id})">✏️ Edit</button>
          <button class="act-btn ab-del" onclick="deleteSupplier(${s.id})">🗑 Delete</button>
        </div>
      </td>
    </tr>`).join('');
}

function viewSup(id){
  const s=allSuppliers.find(x=>x.id===id);
  if(!s) return;
  document.getElementById('sv_name').textContent=s.name;
  document.getElementById('sv_phone').textContent=s.phone||'—';
  document.getElementById('sv_address').textContent=s.address||'—';
  document.getElementById('sv_notes').textContent=s.notes||'—';
  document.getElementById('supViewModal').classList.add('open');
}
function closeSupView(){document.getElementById('supViewModal').classList.remove('open');}

function openSupAdd(){
  editMode=false;
  document.getElementById('supModalTitle').textContent='Add Supplier';
  document.getElementById('sEditId').value='';
  document.getElementById('s_name').value='';
  document.getElementById('s_phone').value='';
  document.getElementById('s_address').value='';
  document.getElementById('s_notes').value='';
  document.getElementById('supModal').classList.add('open');
}

function openSupEdit(id){
  const s=allSuppliers.find(x=>x.id===id);
  if(!s) return;
  editMode=true;
  document.getElementById('supModalTitle').textContent='Edit Supplier';
  document.getElementById('sEditId').value=s.id;
  document.getElementById('s_name').value=s.name;
  document.getElementById('s_phone').value=s.phone||'';
  document.getElementById('s_address').value=s.address||'';
  document.getElementById('s_notes').value=s.notes||'';
  document.getElementById('supModal').classList.add('open');
}
function closeSupModal(){document.getElementById('supModal').classList.remove('open');}

async function saveSupplier(){
  const name=document.getElementById('s_name').value.trim();
  if(!name){toast('Name required',true);return;}
  const payload={name,phone:document.getElementById('s_phone').value.trim(),address:document.getElementById('s_address').value.trim(),notes:document.getElementById('s_notes').value.trim()};
  const id=document.getElementById('sEditId').value;
  const r=editMode
    ? await fetch(`/api/suppliers/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
    : await fetch('/api/suppliers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  if(r.ok){toast(editMode?'Supplier updated!':'Supplier added!');closeSupModal();loadSuppliers();}
  else toast('Error saving',true);
}

async function deleteSupplier(id,name){
  if(!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  const r=await fetch(`/api/suppliers/${id}`,{method:'DELETE'});
  if(r.ok){toast('Supplier deleted');loadSuppliers();}
  else toast('Error deleting',true);
}

function toTitleCase(str){ return str.replace(/(\b\w)/g, c => c.toUpperCase()); }

loadSuppliers();
</script>
{% endblock %}
