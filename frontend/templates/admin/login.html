<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — BillMate</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center}
.icon{font-size:2.8em;margin-bottom:12px}
.title{font-size:1.3em;font-weight:700;color:#1a1a2e;margin-bottom:6px}
.sub{font-size:.88em;color:#888;margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;text-align:left;font-size:.85em;color:#555;margin-bottom:6px}
.field input{width:100%;padding:12px 16px;border:1.5px solid #e0e0e0;border-radius:12px;font-size:.95em;outline:none;color:#1a1a2e;background:#f8f9fa}
.field input:focus{border-color:#667eea;background:#fff}
.btn{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:1em;font-weight:700;cursor:pointer;margin-top:16px;transition:all .2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(102,126,234,.4)}
.err{color:#ef4444;font-size:.84em;margin-top:12px}
.back{display:block;margin-top:20px;font-size:.85em;color:#aaa;text-decoration:none}
.back:hover{color:#667eea}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🛡️</div>
  <div class="title">Admin Login</div>
  <div class="sub">Enter your admin password</div>
  <form id="loginForm">
    <div class="field">
      <label for="password">Admin Password</label>
      <input type="password" id="password" name="password" placeholder="Admin password" required autofocus>
    </div>
    <div id="error" class="err"></div>
    <button type="submit" class="btn">Login to Admin</button>
  </form>
  <a href="/admin/unlock" class="back">Unlock with existing password →</a>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const formData = new FormData(this);
  const errorDiv = document.getElementById('error');

  try {
    const response = await fetch('/auth/admin-login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        password: formData.get('password')
      })
    });

    const data = await response.json();

    if (response.ok) {
      window.location.href = '/admin/sales';
    } else {
      errorDiv.textContent = data.error || 'Login failed';
    }
  } catch (err) {
    errorDiv.textContent = 'Network error occurred';
  }
});
</script>
</body>
</html>
