<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Admin — IP Logs</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html{scrollbar-gutter:stable;background:#0f0c29}
    body{min-height:100vh;background:linear-gradient(135deg,#0f0c29 0%,#1a1a3e 100%);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e2e8f0}

    .topnav{display:flex;align-items:center;gap:12px;padding:0 24px;height:58px;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
    .nav-logo{font-size:1.2em;font-weight:800;color:#fff;text-decoration:none;letter-spacing:-.3px}
    .nav-badge{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;font-size:.72em;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
    .nav-spacer{flex:1}
    .nav-link{padding:7px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:rgba(255,255,255,.7);font-size:.82em;font-weight:600;text-decoration:none;transition:all .2s;white-space:nowrap}
    .nav-link:hover{background:rgba(255,255,255,.12)}
    .nav-link.active{background:rgba(102,126,234,.25);border-color:rgba(102,126,234,.4);color:#a5b4fc}
    .logout-btn{padding:7px 16px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:8px;color:#f87171;font-size:.82em;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s}
    .logout-btn:hover{background:rgba(239,68,68,.25)}

    .page{max-width:1100px;margin:0 auto;padding:28px 20px}
    .page-head{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .page-title{font-size:1.2em;font-weight:700;color:#fff;flex:1}
    .search-box{padding:10px 16px;border:1.5px solid rgba(255,255,255,.15);border-radius:12px;background:rgba(255,255,255,.07);color:#fff;font-size:.88em;width:220px;outline:none;transition:border .2s}
    .search-box:focus{border-color:#a78bfa}
    .search-box::placeholder{color:rgba(255,255,255,.3)}
    .refresh-btn{padding:10px 18px;background:rgba(124,58,237,.25);border:1px solid rgba(124,58,237,.4);border-radius:12px;color:#a78bfa;font-size:.88em;font-weight:700;cursor:pointer;transition:all .2s}
    .refresh-btn:hover{background:rgba(124,58,237,.38)}

    .summary{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 20px;flex:1;min-width:130px}
    .stat-val{font-size:1.6em;font-weight:800;color:#a78bfa}
    .stat-lbl{font-size:.75em;color:rgba(255,255,255,.4);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

    .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    th{padding:11px 16px;text-align:left;font-size:.76em;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid rgba(255,255,255,.08);white-space:nowrap}
    td{padding:11px 16px;font-size:.86em;color:#cbd5e1;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,.03)}
    .td-user{font-weight:700;color:#fff}
    .td-ip{font-family:monospace;color:#a78bfa;font-size:.9em}
    .td-date{color:rgba(255,255,255,.45);font-size:.82em}
    .td-time{font-family:monospace;font-size:.82em;color:rgba(255,255,255,.5)}
    .td-count{text-align:right;color:#6ee7b7;font-weight:700;font-family:monospace}
    .badge-today{display:inline-block;background:rgba(16,185,129,.2);color:#6ee7b7;border-radius:6px;padding:2px 8px;font-size:.72em;font-weight:700;margin-left:6px;vertical-align:middle}
    .badge-old{display:inline-block;background:rgba(255,255,255,.07);color:rgba(255,255,255,.4);border-radius:6px;padding:2px 8px;font-size:.72em;font-weight:600;margin-left:6px;vertical-align:middle}
    .empty{text-align:center;padding:60px 20px;color:rgba(255,255,255,.3)}
    .empty-icon{font-size:3em;margin-bottom:12px}

    /* date group headers */
    .date-header td{background:rgba(124,58,237,.1);color:#a78bfa;font-size:.78em;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:8px 16px}

    .btn-icon{display:none}
    .btn-txt{display:inline}
    @media(max-width:640px){
      .topnav{padding:0 6px;gap:3px;height:64px;flex-wrap:nowrap}
      .nav-spacer{flex:1}
      .nav-badge{display:none}
      .nav-link,.logout-btn{padding:4px 6px;font-size:.82em;flex-shrink:0;display:inline-flex;flex-direction:column;align-items:center;gap:1px;min-width:44px}
      .btn-txt{display:block;font-size:.6em;white-space:nowrap}
      .btn-icon{display:block;font-size:2em;line-height:1}
      .page-head{flex-direction:column;align-items:stretch}
      .search-box{width:100%}
      table,thead,tbody,th,td,tr{display:block}
      thead tr{display:none}
      tr{border-bottom:1.5px solid rgba(255,255,255,.07);padding:6px 0}
      td{padding:5px 16px;display:flex;justify-content:space-between;align-items:center}
      td::before{content:attr(data-label);font-size:.72em;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;min-width:70px}
      .date-header td::before{content:''}
    }
  </style>
</head>
<body>

<nav class="topnav">
  <a href="/superadmin/users" class="nav-logo">⚡ BillMate</a>
  <span class="nav-badge">SUPER ADMIN</span>
  <div class="nav-spacer"></div>
  <a href="/superadmin/users" class="nav-link"><span class="btn-icon">👥</span><span class="btn-txt">Users</span></a>
  <a href="/superadmin/items" class="nav-link"><span class="btn-icon">🌐</span><span class="btn-txt">Items</span></a>
  <a href="/superadmin/messages" class="nav-link"><span class="btn-icon">📬</span><span class="btn-txt">Messages</span><span id="msgBadge" style="display:none;background:#ef4444;color:#fff;border-radius:10px;padding:1px 7px;font-size:.78em;margin-left:3px"></span></a>
  <a href="/superadmin/ip-logs" class="nav-link active"><span class="btn-icon">🔍</span><span class="btn-txt">IP Logs</span></a>
  <a href="/auth/logout" class="logout-btn"><span class="btn-icon">🚪</span><span class="btn-txt">Logout</span></a>
</nav>

<div class="page">
  <div class="page-head">
    <div class="page-title">🔍 User IP Logs <span id="retentionNote" style="font-size:.6em;font-weight:400;color:rgba(255,255,255,.3)">· last 5 days</span></div>
    <input class="search-box" id="searchBox" type="search" placeholder="Filter by user or IP…" oninput="filterLogs(this.value)">
    <button class="refresh-btn" onclick="loadLogs()">↻ Refresh</button>
  </div>

  <div class="summary" id="summary" style="display:none">
    <div class="stat"><div class="stat-val" id="s_users">—</div><div class="stat-lbl">Active Users</div></div>
    <div class="stat"><div class="stat-val" id="s_ips">—</div><div class="stat-lbl">Unique IPs</div></div>
    <div class="stat"><div class="stat-val" id="s_today">—</div><div class="stat-lbl">Seen Today</div></div>
    <div class="stat"><div class="stat-val" id="s_entries">—</div><div class="stat-lbl">Log Entries</div></div>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>User</th>
          <th>IP Address</th>
          <th>Date</th>
          <th>First Seen</th>
          <th>Last Seen</th>
          <th style="text-align:right">Requests</th>
        </tr>
      </thead>
      <tbody id="logsTbody">
        <tr><td colspan="6" class="empty"><div class="empty-icon">⏳</div>Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
var _allLogs = [];
var _today = new Date().toISOString().split('T')[0];

async function loadLogs(){
  document.getElementById('logsTbody').innerHTML =
    '<tr><td colspan="6" class="empty"><div class="empty-icon">⏳</div>Loading…</td></tr>';
  const r = await fetch('/api/superadmin/ip-logs').catch(()=>null);
  if(!r || !r.ok){ showEmpty('Failed to load logs'); return; }
  _allLogs = await r.json();
  updateSummary(_allLogs);
  renderLogs(_allLogs);
}

function updateSummary(logs){
  const users = new Set(logs.map(l=>l.user_id)).size;
  const ips   = new Set(logs.map(l=>l.ip)).size;
  const today = logs.filter(l=>l.date===_today).length;
  document.getElementById('s_users').textContent = users;
  document.getElementById('s_ips').textContent   = ips;
  document.getElementById('s_today').textContent = today;
  document.getElementById('s_entries').textContent = logs.length;
  document.getElementById('summary').style.display = 'flex';
}

function filterLogs(q){
  const lq = q.toLowerCase();
  const filtered = lq
    ? _allLogs.filter(l => l.username.toLowerCase().includes(lq) || l.ip.includes(lq))
    : _allLogs;
  renderLogs(filtered);
}

function renderLogs(logs){
  const tb = document.getElementById('logsTbody');
  if(!logs.length){
    showEmpty('No IP logs found.');
    return;
  }
  // Group rows under date headers
  let lastDate = null;
  tb.innerHTML = logs.map(l => {
    const isToday = l.date === _today;
    const dateBadge = isToday
      ? '<span class="badge-today">TODAY</span>'
      : `<span class="badge-old">${daysAgo(l.date)}</span>`;
    let header = '';
    if(l.date !== lastDate){
      lastDate = l.date;
      const label = isToday ? 'Today — ' + fmt(l.date) : fmt(l.date);
      header = `<tr class="date-header"><td colspan="6">📅 ${label}</td></tr>`;
    }
    return header + `
    <tr>
      <td data-label="User" class="td-user">${esc(l.username)}</td>
      <td data-label="IP" class="td-ip">${esc(l.ip)}</td>
      <td data-label="Date" class="td-date">${fmt(l.date)} ${dateBadge}</td>
      <td data-label="First Seen" class="td-time">${l.first_seen}</td>
      <td data-label="Last Seen" class="td-time">${l.last_seen}</td>
      <td data-label="Requests" class="td-count">${l.count}</td>
    </tr>`;
  }).join('');
}

function showEmpty(msg){
  document.getElementById('logsTbody').innerHTML =
    `<tr><td colspan="6" class="empty"><div class="empty-icon">📭</div>${msg}</td></tr>`;
}

function fmt(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
}

function daysAgo(dateStr){
  const diff = Math.round((new Date(_today) - new Date(dateStr)) / 86400000);
  return diff === 1 ? '1 day ago' : diff + ' days ago';
}

function esc(s){
  return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

loadLogs();
fetch('/api/superadmin/pending-count').then(r=>r.json()).then(d=>{
  if(d.count>0){const b=document.getElementById('msgBadge');b.textContent=d.count;b.style.display='inline';}
}).catch(()=>{});
</script>
</body>
</html>
